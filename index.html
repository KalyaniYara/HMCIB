<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortgage Calculator Form</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f4f6fb;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

.container {
    width: 100%;
    max-width: 650px;
}

.card {
    background: #fff;
    border-radius: 16px;
    padding: 35px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
    color: #54257e;
    margin-bottom: 25px;
    text-align: center;
    font-size: 28px;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
}

input[type="number"],
select {
    width: 100%;
    height: 50px;
    border: 1px solid #d8dde6;
    border-radius: 8px;
    padding: 0 15px;
    font-size: 15px;
    transition: 0.3s;
}

input[type="number"]:focus,
select:focus {
    outline: none;
    border-color: #54257e;
    box-shadow: 0 0 0 3px rgba(84,37,126,0.15);
}

.radio-group {
    display: flex;
    gap: 20px;
    margin-top: 10px;
}

.radio-option {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.radio-option input {
    accent-color: #54257e;
    width: 18px;
    height: 18px;
}

button {
    width: 100%;
    height: 55px;
    background: #54257e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #421b65;
}

#result {
    margin-top: 20px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: #54257e;
}

@media (max-width: 600px) {
    .card {
        padding: 20px;
    }

    .radio-group {
        flex-direction: column;
        gap: 10px;
    }
}
</style>

</head>
<body>

<div class="container">
    <div class="card">

        <h2>Mortgage Calculator</h2>

        <form id="mortgageForm">

            <div class="form-group">
                <label>Number of Applicants</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="applicants" value="1" checked>
                        1 Applicant
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="applicants" value="2">
                        2 Applicants
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Your total annual income before tax</label>
                <input
                    type="number"
                    id="income"
                    placeholder="Enter annual income"
                    required>
            </div>

            <div class="form-group">
                <label>Number of dependants (optional)</label>
                <select id="dependants">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select>
            </div>

            <div class="form-group">
                <label>Monthly expenditure amount</label>
                <input
                    type="number"
                    id="expenditure"
                    placeholder="Enter monthly expenditure"
                    required>
            </div>

            <div class="form-group">
                <label>Length of term</label>
                <select id="term" required>
                    <option value="">Select Term</option>
                </select>
            </div>

            <button type="submit">Calculate</button>

            <div id="result"></div>

        </form>
    </div>
</div>


    <script>
async function registerMortgageTool() {

    if (!document.modelContext) {
        console.log("WebMCP not available");
        return;
    }

    await document.modelContext.registerTool({
        name: "calculate_mortgage",
        description: "Calculate mortgage borrowing amount based on income, dependants, expenditure and mortgage term.",

        inputSchema: {
            type: "object",
            properties: {
                applicants: {
                    type: "number",
                    enum: [1, 2],
                    description: "Number of applicants"
                },
                annualIncome: {
                    type: "number",
                    description: "Total annual income before tax"
                },
                dependants: {
                    type: "number",
                    minimum: 0,
                    maximum: 9
                },
                monthlyExpenditure: {
                    type: "number"
                },
                termYears: {
                    type: "number",
                    minimum: 3,
                    maximum: 40
                }
            },
            required: [
                "applicants",
                "annualIncome",
                "monthlyExpenditure",
                "termYears"
            ]
        },

        execute: async ({
            applicants,
            annualIncome,
            dependants = 0,
            monthlyExpenditure,
            termYears
        }) => {

            // Populate UI
            document.querySelector(
                `input[name="applicants"][value="${applicants}"]`
            ).checked = true;

            document.getElementById("income").value =
                annualIncome;

            document.getElementById("dependants").value =
                dependants;

            document.getElementById("expenditure").value =
                monthlyExpenditure;

            document.getElementById("term").value =
                termYears;

            // Mortgage calculation
            let borrowing = annualIncome * 4.5;

            if (applicants === 2) {
                borrowing *= 1.1;
            }

            borrowing -= dependants * 10000;
            borrowing -= monthlyExpenditure * 12;

            borrowing = Math.max(0, borrowing);

            document.getElementById("result").innerHTML =
                `Estimated Borrowing Amount: £${borrowing.toLocaleString()}`;

            return {
                borrowingAmount: borrowing,
                termYears: termYears,
                applicants: applicants,
                success: true
            };
        }
    });

    console.log("Mortgage tool registered");
}

registerMortgageTool();
</script>


</body>
</html>
